<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>FEH: Guess the Heroes</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">

  <header>
    <h1>GUESS THE HEROES</h1>
    <p>Fire Emblem Heroes</p>
  </header>
  <hr class="hdivider">

  <div class="tabs">
    <button class="tab active" data-mode="shadow">Shadow Quiz</button>
    <button class="tab" data-mode="duo">Duo Shadow</button>
    <button class="tab" data-mode="pixel">Pixel Quiz</button>
    <button class="tab" data-mode="oddone">Odd One Out</button>
  </div>

  <div class="stats" id="stats-bar">
    <div class="stat"><span class="stat-label">Score</span><span class="stat-val" id="score">0</span></div>
    <div class="stat"><span class="stat-label">Streak</span><span class="stat-val" id="streak">0</span></div>
    <div class="stat"><span class="stat-label">Guesses</span><span class="stat-val" id="guesses">0 / 5</span></div>
  </div>

  <div id="quiz-ui">
    <div id="portrait-box">
      <div id="loader"><div class="spin"></div><span id="load-txt">LOADING</span></div>
      <div id="no-portrait">Portrait unavailable — press Next</div>
      <img id="portrait" class="hidden" alt="mystery hero" referrerpolicy="no-referrer">
      <canvas id="pixel-canvas"></canvas>
      <div id="duo-wrap">
        <img id="portrait-a" class="hidden duo-img" alt="hero a" referrerpolicy="no-referrer">
        <img id="portrait-b" class="hidden duo-img" alt="hero b" referrerpolicy="no-referrer">
      </div>
      <div id="pips"></div>
      <div id="result-banner"></div>
    </div>

    <div id="hint"></div>

    <div class="search-row" id="single-search-row">
      <input id="search" type="text" placeholder="Type a hero name..." autocomplete="off" spellcheck="false">
      <div id="autocomplete"></div>
    </div>

    <div id="duo-searches" style="display:none">
      <div class="duo-field">
        <span class="duo-label">Hero 1</span>
        <div class="search-row">
          <input id="search-a" type="text" placeholder="First hero..." autocomplete="off" spellcheck="false">
          <div id="autocomplete-a"></div>
        </div>
        <div id="status-a" class="duo-status"></div>
      </div>
      <div class="duo-field">
        <span class="duo-label">Hero 2</span>
        <div class="search-row">
          <input id="search-b" type="text" placeholder="Second hero..." autocomplete="off" spellcheck="false">
          <div id="autocomplete-b"></div>
        </div>
        <div id="status-b" class="duo-status"></div>
      </div>
    </div>

    <div id="wrong-list"></div>

    <div class="btns">
      <button class="btn" id="btn-guess">GUESS</button>
      <button class="btn" id="btn-giveup">GIVE UP</button>
      <button class="btn" id="btn-next">NEXT →</button>
    </div>
  </div>

  <div id="oddone-ui" style="display:none">
    <div class="stats" id="oddone-stats-bar" style="margin-bottom:10px">
      <div class="stat"><span class="stat-label">Streak</span><span class="stat-val" id="odd-streak">0</span></div>
    </div>
    <div id="oddone-loader"><div class="spin"></div><span>LOADING</span></div>
    <div id="oddone-grid" style="display:none"></div>
    <p id="oddone-instruction">Which title does NOT match any hero shown?</p>
    <div id="oddone-choices"></div>
    <div id="oddone-result"></div>
    <div class="btns" style="margin-top:12px">
      <button class="btn" id="btn-oddone-next" style="display:none">NEXT →</button>
    </div>
  </div>

  <footer>
    <p>Portraits from <a href="https://feheroes.fandom.com" target="_blank">feheroes.fandom.com</a></p>
  </footer>
</div>
<script>
let heroes = [];
let mode = 'shadow';
let cur = null, curB = null;
let guesses = 0, done = false;
let score = 0, streak = 0;
let duoGuessedA = false, duoGuessedB = false;
const MAX = 5;
let oddHeroes = [], oddAnswer = null, oddDone = false;
let oddStreak = 0;

const box      = document.getElementById('portrait-box');
const img      = document.getElementById('portrait');
const duoWrap  = document.getElementById('duo-wrap');
const imgA     = document.getElementById('portrait-a');
const imgB     = document.getElementById('portrait-b');
const loader   = document.getElementById('loader');
const loadTxt  = document.getElementById('load-txt');
const noPort   = document.getElementById('no-portrait');
const banner   = document.getElementById('result-banner');
const pips     = document.getElementById('pips');
const hint     = document.getElementById('hint');
const search   = document.getElementById('search');
const ac       = document.getElementById('autocomplete');
const searchA  = document.getElementById('search-a');
const acA      = document.getElementById('autocomplete-a');
const searchB  = document.getElementById('search-b');
const acB      = document.getElementById('autocomplete-b');
const wrongList= document.getElementById('wrong-list');
const scoreEl  = document.getElementById('score');
const streakEl = document.getElementById('streak');
const guessEl  = document.getElementById('guesses');
const btnGuess = document.getElementById('btn-guess');
const btnGive  = document.getElementById('btn-giveup');
const btnNext  = document.getElementById('btn-next');
const quizUI   = document.getElementById('quiz-ui');
const oddUI    = document.getElementById('oddone-ui');
const statsBar = document.getElementById('stats-bar');

function rand() { return heroes[Math.floor(Math.random() * heroes.length)]; }
function randN(n) {
  const out = [], used = new Set();
  while (out.length < n) {
    const h = rand(), k = h[0]+'|'+h[1];
    if (!used.has(k)) { used.add(k); out.push(h); }
  }
  return out;
}
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function clean(s) { return s.toLowerCase().replace(/['']/g,"'").replace(/[^a-z0-9' ]/g,'').trim(); }
function refreshHUD() { scoreEl.textContent=score; streakEl.textContent=streak; guessEl.textContent=guesses+' / '+MAX; }
function rebuildPips() {
  pips.innerHTML='';
  for(let i=0;i<MAX;i++){const d=document.createElement('div');d.className='pip'+(i<guesses?' used':'');pips.appendChild(d);}
}
function flash(type) { box.classList.remove('fg','fr'); void box.offsetWidth; box.classList.add(type==='win'?'fg':'fr'); setTimeout(()=>box.classList.remove('fg','fr'),700); }
function showBanner(msg,cls){banner.textContent=msg;banner.className='show '+cls;}
function hideBanner(){banner.className='';}

function buildCdnUrl(filename) {
  const normalized = filename.replace(/ /g,'_');
  const hash = md5(normalized);
  return 'https://static.wikia.nocookie.net/feheroes_gamepedia_en/images/'+hash[0]+'/'+hash[0]+hash[1]+'/'+encodeURIComponent(normalized)+'/revision/latest?cb=1';
}

function md5(str) {
  str=unescape(encodeURIComponent(str));
  function safeAdd(x,y){var lsw=(x&0xffff)+(y&0xffff);return(((x>>16)+(y>>16)+(lsw>>16))<<16)|(lsw&0xffff);}
  function rol(n,c){return(n<<c)|(n>>>(32-c));}
  function cmn(q,a,b,x,s,t){return safeAdd(rol(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
  function ff(a,b,c,d,x,s,t){return cmn((b&c)|((~b)&d),a,b,x,s,t);}
  function gg(a,b,c,d,x,s,t){return cmn((b&d)|(c&(~d)),a,b,x,s,t);}
  function hh(a,b,c,d,x,s,t){return cmn(b^c^d,a,b,x,s,t);}
  function ii(a,b,c,d,x,s,t){return cmn(c^(b|(~d)),a,b,x,s,t);}
  var n=str.length,st=[1732584193,-271733879,-1732584194,271733878];
  function blk64(s,i){var b=[];for(var j=0;j<16;j++)b[j]=(s.charCodeAt(i+j*4))|(s.charCodeAt(i+j*4+1)<<8)|(s.charCodeAt(i+j*4+2)<<16)|(s.charCodeAt(i+j*4+3)<<24);return b;}
  function cycle(st,b){
    var a=st[0],bb=st[1],c=st[2],d=st[3];
    a=ff(a,bb,c,d,b[0],7,-680876936);d=ff(d,a,bb,c,b[1],12,-389564586);c=ff(c,d,a,bb,b[2],17,606105819);bb=ff(bb,c,d,a,b[3],22,-1044525330);
    a=ff(a,bb,c,d,b[4],7,-176418897);d=ff(d,a,bb,c,b[5],12,1200080426);c=ff(c,d,a,bb,b[6],17,-1473231341);bb=ff(bb,c,d,a,b[7],22,-45705983);
    a=ff(a,bb,c,d,b[8],7,1770035416);d=ff(d,a,bb,c,b[9],12,-1958414417);c=ff(c,d,a,bb,b[10],17,-42063);bb=ff(bb,c,d,a,b[11],22,-1990404162);
    a=ff(a,bb,c,d,b[12],7,1804603682);d=ff(d,a,bb,c,b[13],12,-40341101);c=ff(c,d,a,bb,b[14],17,-1502002290);bb=ff(bb,c,d,a,b[15],22,1236535329);
    a=gg(a,bb,c,d,b[1],5,-165796510);d=gg(d,a,bb,c,b[6],9,-1069501632);c=gg(c,d,a,bb,b[11],14,643717713);bb=gg(bb,c,d,a,b[0],20,-373897302);
    a=gg(a,bb,c,d,b[5],5,-701558691);d=gg(d,a,bb,c,b[10],9,38016083);c=gg(c,d,a,bb,b[15],14,-660478335);bb=gg(bb,c,d,a,b[4],20,-405537848);
    a=gg(a,bb,c,d,b[9],5,568446438);d=gg(d,a,bb,c,b[14],9,-1019803690);c=gg(c,d,a,bb,b[3],14,-187363961);bb=gg(bb,c,d,a,b[8],20,1163531501);
    a=gg(a,bb,c,d,b[13],5,-1444681467);d=gg(d,a,bb,c,b[2],9,-51403784);c=gg(c,d,a,bb,b[7],14,1735328473);bb=gg(bb,c,d,a,b[12],20,-1926607734);
    a=hh(a,bb,c,d,b[5],4,-378558);d=hh(d,a,bb,c,b[8],11,-2022574463);c=hh(c,d,a,bb,b[11],16,1839030562);bb=hh(bb,c,d,a,b[14],23,-35309556);
    a=hh(a,bb,c,d,b[1],4,-1530992060);d=hh(d,a,bb,c,b[4],11,1272893353);c=hh(c,d,a,bb,b[7],16,-155497632);bb=hh(bb,c,d,a,b[10],23,-1094730640);
    a=hh(a,bb,c,d,b[13],4,681279174);d=hh(d,a,bb,c,b[0],11,-358537222);c=hh(c,d,a,bb,b[3],16,-722521979);bb=hh(bb,c,d,a,b[6],23,76029189);
    a=hh(a,bb,c,d,b[9],4,-640364487);d=hh(d,a,bb,c,b[12],11,-421815835);c=hh(c,d,a,bb,b[15],16,530742520);bb=hh(bb,c,d,a,b[2],23,-995338651);
    a=ii(a,bb,c,d,b[0],6,-198630844);d=ii(d,a,bb,c,b[7],10,1126891415);c=ii(c,d,a,bb,b[14],15,-1416354905);bb=ii(bb,c,d,a,b[5],21,-57434055);
    a=ii(a,bb,c,d,b[12],6,1700485571);d=ii(d,a,bb,c,b[3],10,-1894986606);c=ii(c,d,a,bb,b[10],15,-1051523);bb=ii(bb,c,d,a,b[1],21,-2054922799);
    a=ii(a,bb,c,d,b[8],6,1873313359);d=ii(d,a,bb,c,b[15],10,-30611744);c=ii(c,d,a,bb,b[6],15,-1560198380);bb=ii(bb,c,d,a,b[13],21,1309151649);
    a=ii(a,bb,c,d,b[4],6,-145523070);d=ii(d,a,bb,c,b[11],10,-1120210379);c=ii(c,d,a,bb,b[2],15,718787259);bb=ii(bb,c,d,a,b[9],21,-343485551);
    return[safeAdd(a,st[0]),safeAdd(bb,st[1]),safeAdd(c,st[2]),safeAdd(d,st[3])];
  }
  var i;for(i=64;i<=n;i+=64)st=cycle(st,blk64(str,i-64));
  var tail=str.slice(i-64),buf=new Array(16).fill(0);
  for(var j=0;j<tail.length;j++)buf[j>>2]|=tail.charCodeAt(j)<<((j%4)*8);
  buf[tail.length>>2]|=0x80<<((tail.length%4)*8);
  if(tail.length>55){st=cycle(st,buf);buf=new Array(16).fill(0);}
  buf[14]=n*8;st=cycle(st,buf);
  return st.map(v=>{var s='';for(var k=0;k<4;k++)s+=('0'+((v>>>(k*8))&0xff).toString(16)).slice(-2);return s;}).join('');
}

const pixelCanvas = document.getElementById('pixel-canvas');

function loadImg(el, hero, className, cb) {
  el.className = className;
  el.style.display = 'none';
  el.src = buildCdnUrl(hero[0]+' '+hero[1]+' Face.webp');
  el.onload  = () => { el.style.display='block'; cb&&cb(true); };
  el.onerror = () => { cb&&cb(false); };
}

function drawPixelated(srcImg) {
  // Draw the image at a tiny grid size then scale back up for chunky blocks
  const PIXEL_SIZE = 16; // number of pixel "blocks" wide
  const aspect = srcImg.naturalHeight / srcImg.naturalWidth;
  const ROWS = Math.round(PIXEL_SIZE * aspect);

  const offscreen = document.createElement('canvas');
  offscreen.width  = PIXEL_SIZE;
  offscreen.height = ROWS;
  const ctx = offscreen.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(srcImg, 0, 0, PIXEL_SIZE, ROWS);

  // Scale up to fill the display canvas
  pixelCanvas.width  = pixelCanvas.offsetWidth  || 400;
  pixelCanvas.height = pixelCanvas.offsetHeight || 480;
  const dctx = pixelCanvas.getContext('2d');
  dctx.imageSmoothingEnabled = false;
  dctx.drawImage(offscreen, 0, 0, pixelCanvas.width, pixelCanvas.height);
}

// ── SHADOW / PIXEL ─────────────────────────────────────────────────────────────
function startSingle(hero) {
  cur=hero; guesses=0; done=false;
  search.value=''; search.disabled=false;
  btnGuess.disabled=false; btnGive.disabled=false;
  btnNext.classList.remove('show');
  ac.style.display='none';
  wrongList.innerHTML='';
  hint.textContent=''; hint.classList.remove('show');
  hideBanner(); rebuildPips(); refreshHUD();
  duoWrap.style.display='none'; img.style.display='none';
  pixelCanvas.style.display='none';
  box.classList.remove('done'); loader.style.display='flex'; noPort.style.display='none';

  if (mode === 'pixel') {
    img.removeAttribute('src');
    img.style.display = 'none';
    noPort.style.display = 'none';
    const heroUrl = buildCdnUrl(hero[0]+' '+hero[1]+' Face.webp');
    img._pixelSrc = heroUrl;
    const tempImg = new Image();
    tempImg.crossOrigin = 'anonymous';
    tempImg.referrerPolicy = 'no-referrer';
    tempImg.onload = () => {
      loader.style.display = 'none';
      noPort.style.display = 'none';
      drawPixelated(tempImg);
      pixelCanvas.style.display = 'block';
    };
    tempImg.onerror = () => {
      loader.style.display = 'none';
      pixelCanvas.style.display = 'none';
      noPort.style.display = 'flex';
    };
    tempImg.src = heroUrl;
  } else {
    loadImg(img, hero, 'hidden', ok => { loader.style.display='none'; if(!ok) noPort.style.display='flex'; });
  }
}

function endSingle(won) {
  done=true; search.disabled=true; btnGuess.disabled=true; btnGive.disabled=true;
  btnNext.classList.add('show'); ac.style.display='none'; box.classList.add('done');
  // Hide canvas, reveal full portrait
  pixelCanvas.style.display = 'none';
  noPort.style.display = 'none';
  if (mode === 'pixel') {
    img.src = img._pixelSrc || buildCdnUrl(cur[0]+' '+cur[1]+' Face.webp');
  }
  img.style.display = 'block';
  img.className = 'shown';
  if (won) {
    const pts=Math.max(10,(MAX-guesses+1)*10); score+=pts; streak++;
    showBanner('✦ '+cur[0]+': '+cur[1]+'  +'+pts+' pts','win'); flash('win');
  } else {
    score=0; streak=0;
    showBanner(cur[0]+': '+cur[1],'reveal'); flash('lose');
  }
  refreshHUD();
}

function guessSingle() {
  if(done) return;
  const val=search.value.trim(); if(!val) return;
  ac.style.display='none'; guesses++; rebuildPips(); refreshHUD();
  const g=clean(val);
  if(g===clean(cur[0]+' '+cur[1])||g===clean(cur[0]+': '+cur[1])){endSingle(true);return;}
  const tag=document.createElement('div'); tag.className='wrong-tag'; tag.textContent=val; wrongList.appendChild(tag);
  flash('lose');
  if(guesses>=MAX){endSingle(false);return;}
  const hints=[null,'First name starts with "'+cur[0][0]+'"','First name: '+cur[0],cur[0]+': '+cur[1].slice(0,4)+'...',cur[0]+': '+cur[1].slice(0,7)+'...'];
  if(hints[guesses]){hint.textContent=hints[guesses];hint.classList.remove('show');void hint.offsetWidth;hint.classList.add('show');}
  const left=MAX-guesses;
  showBanner('✗  '+left+' guess'+(left!==1?'es':'')+' left','bad'); setTimeout(hideBanner,1400);
  search.value=''; search.focus();
}

// ── DUO ────────────────────────────────────────────────────────────────────────
function startDuo() {
  const pair=randN(2); cur=pair[0]; curB=pair[1];
  guesses=0; done=false; duoGuessedA=false; duoGuessedB=false;
  searchA.value=''; searchA.disabled=false;
  searchB.value=''; searchB.disabled=false;
  btnGuess.disabled=false; btnGive.disabled=false;
  btnNext.classList.remove('show');
  acA.style.display='none'; acB.style.display='none';
  wrongList.innerHTML=''; hint.textContent=''; hint.classList.remove('show');
  document.getElementById('status-a').textContent=''; document.getElementById('status-a').className='duo-status';
  document.getElementById('status-b').textContent=''; document.getElementById('status-b').className='duo-status';
  hideBanner(); rebuildPips(); refreshHUD();
  box.classList.remove('done'); loader.style.display='flex'; noPort.style.display='none';
  pixelCanvas.style.display='none';
  img.style.display='none'; duoWrap.style.display='flex'; imgA.style.display='none'; imgB.style.display='none';
  let loaded=0;
  function onLoad(ok){
    loaded++;
    if(loaded===2){
      loader.style.display='none';
      // Reveal both simultaneously only when both are ready
      if(imgA.complete && imgA.naturalWidth) imgA.style.display='block';
      if(imgB.complete && imgB.naturalWidth) imgB.style.display='block';
    }
  }
  // Pre-set display none and load; don't show individually
  imgA.style.display='none'; imgB.style.display='none';
  imgA.className='hidden duo-img'; imgA.referrerPolicy='no-referrer';
  imgB.className='hidden duo-img'; imgB.referrerPolicy='no-referrer';
  imgA.src=buildCdnUrl(cur[0]+' '+cur[1]+' Face.webp');
  imgB.src=buildCdnUrl(curB[0]+' '+curB[1]+' Face.webp');
  imgA.onload=()=>onLoad(true);  imgA.onerror=()=>onLoad(false);
  imgB.onload=()=>onLoad(true);  imgB.onerror=()=>onLoad(false);
}

function endDuo(won) {
  done=true; searchA.disabled=true; searchB.disabled=true;
  btnGuess.disabled=true; btnGive.disabled=true;
  btnNext.classList.add('show'); acA.style.display='none'; acB.style.display='none';
  box.classList.add('done'); imgA.className='shown duo-img'; imgB.className='shown duo-img';
  if(won){
    const pts=Math.max(10,(MAX-guesses+1)*10); score+=pts; streak++;
    showBanner('✦ Both correct!  +'+pts+' pts','win'); flash('win');
  } else {
    score=0; streak=0;
    showBanner(cur[0]+': '+cur[1]+'  &  '+curB[0]+': '+curB[1],'reveal'); flash('lose');
  }
  refreshHUD();
}

function guessDuo() {
  if(done) return;
  const valA=searchA.value.trim(), valB=searchB.value.trim();
  if(!valA&&!valB) return;
  guesses++; rebuildPips(); refreshHUD();
  const sA=document.getElementById('status-a'), sB=document.getElementById('status-b');
  if(!duoGuessedA&&valA){
    if(clean(valA)===clean(cur[0]+' '+cur[1])||clean(valA)===clean(cur[0]+': '+cur[1])){
      duoGuessedA=true; sA.textContent='✓ '+cur[0]+': '+cur[1]; sA.className='duo-status correct'; searchA.disabled=true;
    } else { sA.textContent='✗ Wrong'; sA.className='duo-status wrong'; }
  }
  if(!duoGuessedB&&valB){
    if(clean(valB)===clean(curB[0]+' '+curB[1])||clean(valB)===clean(curB[0]+': '+curB[1])){
      duoGuessedB=true; sB.textContent='✓ '+curB[0]+': '+curB[1]; sB.className='duo-status correct'; searchB.disabled=true;
    } else { sB.textContent='✗ Wrong'; sB.className='duo-status wrong'; }
  }
  flash(duoGuessedA&&duoGuessedB?'win':'lose');
  if(duoGuessedA&&duoGuessedB){endDuo(true);return;}
  if(guesses>=MAX){endDuo(false);return;}
  const left=MAX-guesses;
  showBanner('✗  '+left+' guess'+(left!==1?'es':'')+' left','bad'); setTimeout(hideBanner,1400);
  if(!duoGuessedA) searchA.value='';
  if(!duoGuessedB) searchB.value='';
}

// ── ODD ONE OUT ────────────────────────────────────────────────────────────────
function startOddOne() {
  oddDone=false; oddHeroes=randN(5);
  const grid=document.getElementById('oddone-grid');
  const choices=document.getElementById('oddone-choices');
  const result=document.getElementById('oddone-result');
  const oLoader=document.getElementById('oddone-loader');
  grid.innerHTML=''; choices.innerHTML=''; result.innerHTML=''; result.className='';
  oLoader.style.display='flex'; grid.style.display='none';
  document.getElementById('btn-oddone-next').style.display='none';
  let loaded=0;
  oddHeroes.forEach((h,i)=>{
    const im=document.createElement('img');
    im.className='oddone-portrait'; im.alt='hero '+(i+1); im.referrerPolicy='no-referrer';
    im.src=buildCdnUrl(h[0]+' '+h[1]+' Face.webp');
    im.onload=im.onerror=()=>{loaded++;if(loaded===5){oLoader.style.display='none';grid.style.display='grid';buildChoices();}};
    grid.appendChild(im);
  });
}

function buildChoices() {
  const choices=document.getElementById('oddone-choices');
  const epithets=oddHeroes.map(h=>h[1]);
  // Pick a fake epithet not belonging to any shown hero
  let fake; do{fake=rand()[1];}while(epithets.includes(fake));
  oddAnswer=fake;
  // Drop one random real epithet: keep 4 real + 1 fake = 5 buttons total
  const dropped=Math.floor(Math.random()*5);
  const shown=epithets.filter((_,i)=>i!==dropped);
  shuffle([...shown,fake]).forEach(ep=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=ep;
    btn.addEventListener('click',()=>pickChoice(ep,btn));
    choices.appendChild(btn);
  });
}

function pickChoice(ep,btn) {
  if(oddDone) return; oddDone=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    b.classList.add(b.textContent===oddAnswer?'choice-correct':'choice-matched');
  });
  const resultEl=document.getElementById('oddone-result');
  const won=ep===oddAnswer;
  btn.classList.remove('choice-matched','choice-correct');
  btn.classList.add(won?'choice-correct':'choice-wrong');
  if(won){ oddStreak++; } else { oddStreak=0; }
  document.getElementById('odd-streak').textContent=oddStreak;
  resultEl.className='oddone-verdict '+(won?'win':'lose');
  resultEl.innerHTML=(won?'✦ Correct! Streak: '+oddStreak:'✗ Wrong — the odd one out was: <strong>'+oddAnswer+'</strong>');
  const reveal=document.createElement('div'); reveal.className='oddone-reveal';
  oddHeroes.forEach((h,i)=>{
    const d=document.createElement('div'); d.className='oddone-reveal-item';
    d.textContent=(i+1)+'. '+h[0]+': '+h[1]; reveal.appendChild(d);
  });
  resultEl.appendChild(reveal);
  document.getElementById('btn-oddone-next').style.display='block';
}

// ── AUTOCOMPLETE ───────────────────────────────────────────────────────────────
function filterHeroes(q) {
  if(!q) return [];
  const lq=q.toLowerCase();
  return heroes.filter(h=>{const full=(h[0]+' '+h[1]).toLowerCase();return full.includes(lq)||h[0].toLowerCase().startsWith(lq);});
}

function setupAC(inputEl,dropEl,onPick) {
  const ref={list:[],idx:-1};
  function render(list){
    ref.list=list;ref.idx=-1;
    if(!list.length){dropEl.style.display='none';return;}
    dropEl.innerHTML='';
    list.forEach(h=>{
      const d=document.createElement('div');d.className='ac-item';
      d.innerHTML='<span class="ac-name">'+h[0]+'</span><span class="ac-epithet">'+h[1]+'</span>';
      d.addEventListener('mousedown',e=>{e.preventDefault();onPick(h);dropEl.style.display='none';});
      dropEl.appendChild(d);
    });
    dropEl.style.display='block';
  }
  inputEl.addEventListener('input',()=>render(filterHeroes(inputEl.value)));
  inputEl.addEventListener('keydown',e=>{
    const items=dropEl.querySelectorAll('.ac-item');
    if(e.key==='ArrowDown'){e.preventDefault();ref.idx=Math.min(ref.idx+1,items.length-1);items.forEach((el,j)=>el.classList.toggle('hi',j===ref.idx));}
    else if(e.key==='ArrowUp'){e.preventDefault();ref.idx=Math.max(ref.idx-1,-1);items.forEach((el,j)=>el.classList.toggle('hi',j===ref.idx));}
    else if(e.key==='Escape'){dropEl.style.display='none';}
  });
  inputEl.addEventListener('blur',()=>setTimeout(()=>dropEl.style.display='none',160));
}

setupAC(search, ac, h=>{search.value=h[0]+': '+h[1];search.focus();});
setupAC(searchA,acA,h=>{searchA.value=h[0]+': '+h[1];searchA.focus();});
setupAC(searchB,acB,h=>{searchB.value=h[0]+': '+h[1];searchB.focus();});

btnGuess.addEventListener('click',()=>mode==='duo'?guessDuo():guessSingle());
btnGive.addEventListener('click',()=>{if(!done){if(mode==='duo')endDuo(false);else endSingle(false);}});

// ── TABS ───────────────────────────────────────────────────────────────────────
function startMode() {
  if(mode==='oddone'){
    quizUI.style.display='none'; oddUI.style.display='block'; statsBar.style.display='none';
    startOddOne(); return;
  }
  quizUI.style.display='block'; oddUI.style.display='none'; statsBar.style.display='flex';
  document.getElementById('single-search-row').style.display = mode==='duo'?'none':'block';
  document.getElementById('duo-searches').style.display = mode==='duo'?'block':'none';
  if(mode==='duo') startDuo(); else startSingle(rand());
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    mode=tab.dataset.mode;
    score=0; streak=0;
    startMode();
  });
});

// ── PARSE WIKI FILENAMES ───────────────────────────────────────────────────────
function parseFile(title) {
  if(/Placeholder|Removed/i.test(title)) return null;
  if(!/\.webp$/i.test(title)) return null;
  let s=title.replace('File:','').replace(/ Face\.webp$/i,'').trim();
  if(s.endsWith(' Resplendent')) return null;
  if (/^Fafnir .*Dragon$/i.test(s)) return null;
  if (/^Bruno .*Unmasked$/i.test(s)) return null;
  if (/^Bruno .*Injured$/i.test(s)) return null;
  if (/^Bruno .*Beset$/i.test(s)) return null;
  if (/^Rune .*Alfador$/i.test(s)) return null;
  if (/^Elm .*Injured$/i.test(s)) return null;
  if (/^Laeradr .*Disappear$/i.test(s)) return null;
  if (/^Askr .*Disappear$/i.test(s)) return null;
  if (/^Gullveig .*Disappear$/i.test(s)) return null;
  if (/^Veronica .*Emblian Princess$/i.test(s)) return null;
  if (/^Veronica .*Emblian Princess Injured$/i.test(s)) return null;
  if (/^Veronica .*Beset$/i.test(s)) return null;
  if (/^Veronica .*Dark$/i.test(s)) return null;
  if (/^Veronica .*Injured$/i.test(s)) return null;
  if (/^Baldr .*Weakened$/i.test(s)) return null;
  if (/^Heidr .*Cursed Goddess$/i.test(s)) return null;
  if (/^Heidr .*Goddess Serpent$/i.test(s)) return null;
  if (/^Letizia .*Dark$/i.test(s)) return null;
  if(s.startsWith('Black Knight ')) return ['Black Knight',s.slice(13)];
  if(s.startsWith('Brigand Boss ')) return ['Brigand Boss',s.slice(13)];
  if(s.startsWith('Flame Emperor ')) return ['Flame Emperor',s.slice(14)];
  if(s.startsWith('Death Knight ')) return ['Death Knight',s.slice(13)];
  const sp=s.indexOf(' '); if(sp<0) return null;
  return [s.slice(0,sp),s.slice(sp+1)];
}

async function loadHeroList() {
  loadTxt.textContent='LOADING HEROES';
  let cont=null;
  do {
    let url='https://feheroes.fandom.com/api.php?action=query&list=categorymembers&cmtitle=Category:Full_Portrait_files&cmlimit=500&cmtype=file&format=json&origin=*';
    if(cont) url+='&cmcontinue='+encodeURIComponent(cont);
    const r=await fetch(url), d=await r.json();
    for(const item of d.query.categorymembers){const p=parseFile(item.title);if(p&&p[1])heroes.push(p);}
    cont=d.continue?d.continue.cmcontinue:null;
  } while(cont);
}

async function init() {
  loader.style.display='flex'; img.style.display='none';
  search.disabled=true; btnGuess.disabled=true; btnGive.disabled=true;
  try{await loadHeroList();}
  catch(e){loadTxt.textContent='FAILED — check connection';return;}
  startMode();
}

init();
